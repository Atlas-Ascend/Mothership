name: Diagnose ASS-LIGHT Android Full Gradle Bundle

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/ass-light-android/project/**"
      - ".github/workflows/diagnose-ass-light-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - uses: android-actions/setup-android@v3
      - name: Install Android 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      - name: Run exact full release command with captured receipt
        working-directory: apps/ass-light-android/project
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          python3 tools/generate_sounds.py > diagnostics/sounds.log 2>&1
          gradle --no-daemon clean :app:lintRelease :app:assembleRelease :app:bundleRelease :app:assembleDebug :app:assembleDebugAndroidTest --stacktrace --console=plain > diagnostics/gradle.log 2>&1
          code=$?
          tail -n 400 diagnostics/gradle.log > diagnostics/gradle-tail.log
          echo "exit_code=$code" > diagnostics/verdict.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: ASS-LIGHT-Full-Gradle-Diagnostics
          path: apps/ass-light-android/project/diagnostics/
          if-no-files-found: error
          retention-days: 7
