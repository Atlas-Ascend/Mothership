name: Build, SECA Audit, and Publish ASS-LIGHT Android RC

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/ass-light-android/project/**"
      - ".github/workflows/build-ass-light-android.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ass-light-android/project/**"
      - ".github/workflows/build-ass-light-android.yml"

permissions:
  contents: write

concurrency:
  group: ass-light-android-rc1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-audit-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      PROJECT_DIR: apps/ass-light-android/project
      DOWNLOAD_DIR: apps/ass-light-android/project/downloads
      APK_NAME: ASS-LIGHT-Android-RC1.apk
      AAB_NAME: ASS-LIGHT-Android-RC1.aab
      RELEASE_TAG: ass-light-android-rc1
      PACKAGE_ID: com.ghostatlas.asslight.rc

    steps:
      - name: Checkout line-visible ASS-LIGHT source
        uses: actions/checkout@v4

      - name: Verify direct-source baseline exists
        run: |
          set -euo pipefail
          test -f "$PROJECT_DIR/app/build.gradle"
          test -f "$PROJECT_DIR/tools/generate_sounds.py"
          test -f "$PROJECT_DIR/tools/seca_audit.py"
          test -f "$PROJECT_DIR/PRODUCT_DEFINITION.json"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 15 platform and build tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" "emulator" "system-images;android-35;google_apis;x86_64"

      - name: Generate twelve original sounds and run SECA source audit
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          python3 tools/generate_sounds.py
          python3 tools/seca_audit.py --stage source

      - name: Compile, lint, sign, and assemble Android artifacts
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -uo pipefail
          mkdir -p receipts downloads
          if ! gradle --no-daemon --console=plain clean :app:lintRelease :app:assembleRelease :app:bundleRelease :app:assembleDebug :app:assembleDebugAndroidTest > receipts/GRADLE_BUILD.log 2>&1; then
            echo "===== EXACT GRADLE FAILURE TAIL ====="
            tail -n 180 receipts/GRADLE_BUILD.log
            exit 1
          fi
          tail -n 40 receipts/GRADLE_BUILD.log
          cp app/build/outputs/apk/release/app-release.apk "downloads/$APK_NAME"
          cp app/build/outputs/bundle/release/app-release.aab "downloads/$AAB_NAME"

      - name: Verify APK signature, identity, SDK, and no-network boundary
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "downloads/$APK_NAME" | tee receipts/APKSIGNER_RECEIPT.txt
          "$BUILD_TOOLS/aapt" dump badging "downloads/$APK_NAME" | tee receipts/AAPT_BADGING_RECEIPT.txt
          grep -q "package: name='$PACKAGE_ID'" receipts/AAPT_BADGING_RECEIPT.txt
          grep -q "targetSdkVersion:'35'" receipts/AAPT_BADGING_RECEIPT.txt
          if grep -q "android.permission.INTERNET" receipts/AAPT_BADGING_RECEIPT.txt; then
            echo "Unexpected INTERNET permission" >&2
            exit 1
          fi
          python3 tools/seca_audit.py --stage artifact \
            --apk "downloads/$APK_NAME" \
            --aab "downloads/$AAB_NAME" \
            --apksigner-receipt receipts/APKSIGNER_RECEIPT.txt \
            --badging-receipt receipts/AAPT_BADGING_RECEIPT.txt

      - name: Run API 35 installation, launch, playback, foreground-service, and Portal Seal gates
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/$PROJECT_DIR"
            adb install -r "downloads/$APK_NAME" | tee receipts/ADB_INSTALL_RECEIPT.txt
            adb shell pm grant "$PACKAGE_ID" android.permission.POST_NOTIFICATIONS || true
            adb shell monkey -p "$PACKAGE_ID" -c android.intent.category.LAUNCHER 1 | tee receipts/ADB_LAUNCH_RECEIPT.txt
            sleep 2
            adb shell pidof "$PACKAGE_ID"
            adb logcat -c
            gradle --no-daemon connectedDebugAndroidTest
            if adb logcat -d | grep -E "FATAL EXCEPTION|AndroidRuntime.*com.ghostatlas.asslight"; then
              echo "ASS-LIGHT crashed during emulator audit" >&2
              exit 1
            fi

      - name: Run SECA runtime and final promotion audits
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          python3 tools/seca_audit.py --stage runtime \
            --test-results app/build/outputs/androidTest-results/connected \
            --install-receipt receipts/ADB_INSTALL_RECEIPT.txt \
            --launch-receipt receipts/ADB_LAUNCH_RECEIPT.txt
          python3 tools/seca_audit.py --stage final

      - name: Assemble public APK and proof packet
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          cp PRODUCT_DEFINITION.json downloads/
          cp SECA_GATE_MATRIX.json downloads/
          cp docs/BUILD_TRUTH.md downloads/
          cp docs/PRIVACY_POLICY.md downloads/
          cp docs/DATA_SAFETY.md downloads/
          cp docs/MANUAL_HITL_DEVICE_RECEIPT.md downloads/
          cp receipts/SECA_SOURCE_AUDIT.json downloads/
          cp receipts/SECA_SOURCE_AUDIT.md downloads/
          cp receipts/SECA_ARTIFACT_AUDIT.json downloads/
          cp receipts/SECA_ARTIFACT_AUDIT.md downloads/
          cp receipts/SECA_RUNTIME_AUDIT.json downloads/
          cp receipts/SECA_RUNTIME_AUDIT.md downloads/
          cp receipts/SECA_FINAL_RELEASE_RECEIPT.json downloads/
          cp receipts/SECA_FINAL_RELEASE_RECEIPT.md downloads/
          cp receipts/APKSIGNER_RECEIPT.txt downloads/
          cp receipts/AAPT_BADGING_RECEIPT.txt downloads/
          cp receipts/ADB_INSTALL_RECEIPT.txt downloads/
          cp receipts/ADB_LAUNCH_RECEIPT.txt downloads/
          cp receipts/GRADLE_BUILD.log downloads/
          zip -qr downloads/ASS-LIGHT-Android-RC1-source.zip \
            README.md PRODUCT_DEFINITION.json SECA_GATE_MATRIX.json settings.gradle build.gradle gradle.properties app tools docs \
            -x 'app/build/*' 'app/src/main/res/raw/*.wav' 'app/src/main/res/raw/sound_manifest.json' 'receipts/*' 'downloads/*' 'tools/__pycache__/*'
          sha256sum downloads/ASS-LIGHT-Android-RC1.apk downloads/ASS-LIGHT-Android-RC1.aab downloads/ASS-LIGHT-Android-RC1-source.zip > downloads/SHA256SUMS.txt
          cat > downloads/INSTALL.txt <<'TXT'
          ASS-LIGHT Android RC1

          1. Download ASS-LIGHT-Android-RC1.apk on the Android phone or Chromebook.
          2. Open or transfer the APK to the Android phone.
          3. Android may ask you to allow installs from the browser or Files app. Enable it only for that source.
          4. Tap Install, then Open.
          5. Grant notifications so an active portal remains visible and stoppable.
          6. Grant camera only when deliberately enabling the flashlight. ASS-LIGHT never captures photos or video.

          The AAB is not directly installable. It is only a technical candidate. Private Google Play signing and Play Console review remain blocked gates.
          TXT

      - name: Preserve immutable workflow proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASS-LIGHT-Android-RC1-Proof-Packet
          path: ${{ env.DOWNLOAD_DIR }}/*
          if-no-files-found: error
          retention-days: 90

      - name: Publish or replace hosted GitHub release assets
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DOWNLOAD_DIR"/* --clobber
          else
            gh release create "$RELEASE_TAG" "$DOWNLOAD_DIR"/* \
              --title "ASS-LIGHT Android RC1" \
              --notes "Direct-install Android release candidate. Automated SECA source, generated-audio, compile, lint, signing, package, emulator installation, launch, MediaPlayer playback, foreground-session, and Portal Seal gates passed. Physical-phone speaker, flashlight, lock-screen, OEM battery, private Play signing, and Play Console approval remain explicit manual gates."
          fi
