# SECA review run revision 3
name: ASS-LIGHT Android SECA Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["apps/ass-light-android/source.zip", ".github/workflows/build-ass-light-android.yml"]
  pull_request:
    branches: [main]
    paths: ["apps/ass-light-android/source.zip", ".github/workflows/build-ass-light-android.yml"]

permissions:
  contents: write

concurrency:
  group: ass-light-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seca:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      P: build/ass-light-android
      APK: ASS-LIGHT-Android-RC1.apk
      AAB: ASS-LIGHT-Android-RC1.aab
      PKG: com.ghostatlas.asslight.rc
      TAG: ass-light-android-rc1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: gradle/actions/setup-gradle@v4
        with: {gradle-version: '8.10.2'}
      - uses: android-actions/setup-android@v3

      - name: Unpack immutable source packet
        run: |
          set -euo pipefail
          rm -rf "$P" && mkdir -p "$P"
          unzip -q apps/ass-light-android/source.zip -d "$P"
          test -f "$P/PRODUCT_DEFINITION.json"
          test -f "$P/app/build.gradle"
          test -f "$P/tools/seca_audit.py"

      - name: Generate original sounds, source-audit, lint, and build
        working-directory: ${{ env.P }}
        run: |
          set -euo pipefail
          python3 tools/generate_sounds.py
          base64 -d signing/asslight-direct.keystore.b64 > signing/asslight-direct.keystore
          python3 tools/seca_audit.py --stage source
          gradle --no-daemon clean :app:lintRelease :app:assembleRelease :app:bundleRelease :app:assembleDebug :app:assembleDebugAndroidTest
          mkdir -p downloads receipts
          cp app/build/outputs/apk/release/app-release.apk "downloads/$APK"
          cp app/build/outputs/bundle/release/app-release.aab "downloads/$AAB"

      - name: Verify signing, package identity, permissions, and artifact truth
        working-directory: ${{ env.P }}
        run: |
          set -euo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          "$BT/apksigner" verify --verbose --print-certs "downloads/$APK" | tee receipts/APKSIGNER_RECEIPT.txt
          "$BT/aapt" dump badging "downloads/$APK" | tee receipts/AAPT_BADGING_RECEIPT.txt
          grep -q "package: name='$PKG'" receipts/AAPT_BADGING_RECEIPT.txt
          ! grep -q "android.permission.INTERNET" receipts/AAPT_BADGING_RECEIPT.txt
          python3 tools/seca_audit.py --stage artifact --apk "downloads/$APK" --aab "downloads/$AAB" --apksigner-receipt receipts/APKSIGNER_RECEIPT.txt --aapt-receipt receipts/AAPT_BADGING_RECEIPT.txt

      - name: Emulator install, launch, audio receipt, and stop cleanup
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/$P"
            adb install -r "downloads/$APK" | tee receipts/ADB_INSTALL_RECEIPT.txt
            adb shell pm grant "$PKG" android.permission.POST_NOTIFICATIONS || true
            adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1 | tee receipts/ADB_LAUNCH_RECEIPT.txt
            gradle --no-daemon connectedDebugAndroidTest

      - name: Runtime audit, final audit, and proof packet
        working-directory: ${{ env.P }}
        run: |
          set -euo pipefail
          python3 tools/seca_audit.py --stage runtime --test-results app/build/outputs/androidTest-results/connected --install-receipt receipts/ADB_INSTALL_RECEIPT.txt --launch-receipt receipts/ADB_LAUNCH_RECEIPT.txt
          python3 tools/seca_audit.py --stage final
          cp PRODUCT_DEFINITION.json SECA_GATE_MATRIX.json downloads/
          cp docs/*.md receipts/* downloads/
          cp "$GITHUB_WORKSPACE/apps/ass-light-android/source.zip" downloads/ASS-LIGHT-Android-RC1-source.zip
          sha256sum downloads/* > downloads/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ASS-LIGHT-Android-RC1-Proof-Packet
          path: ${{ env.P }}/downloads/*
          if-no-files-found: error
          retention-days: 90

      - name: Publish direct-download release
        if: github.event_name != 'pull_request'
        working-directory: ${{ env.P }}
        env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" downloads/* --clobber
          else
            gh release create "$TAG" downloads/* --title "ASS-LIGHT Android RC1" --notes "Automated SECA source, artifact, signing, emulator installation, launch, audio startup, and stop-cleanup gates passed. Physical-phone speaker, flashlight, lock-screen, and OEM battery behavior remain manual HITL gates."
          fi
